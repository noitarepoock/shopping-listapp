<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>쇼핑 리스트</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: light-dark(#f5f5f7, #000000);
    --card: light-dark(#ffffff, #1c1c1e);
    --text: light-dark(#1c1c1e, #f2f2f7);
    --sub: light-dark(#6e6e73, #98989f);
    --accent: light-dark(#007aff, #0a84ff);
    --danger: light-dark(#ff3b30, #ff453a);
    --border: light-dark(#e5e5ea, #38383a);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    min-height: 100vh;
    padding: 24px 16px;
  }
  .app {
    width: 100%;
    max-width: 420px;
  }
  h1 {
    font-size: 24px;
    font-weight: 700;
    margin: 8px 0 16px;
    text-align: center;
  }
  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  #item-input {
    flex: 1;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-size: 16px;
    outline: none;
  }
  #item-input:focus {
    border-color: var(--accent);
  }
  #add-btn {
    padding: 12px 18px;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: white;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
  }
  #add-btn:active {
    opacity: 0.8;
  }
  .stats {
    font-size: 13px;
    color: var(--sub);
    margin-bottom: 8px;
    padding: 0 4px;
    display: flex;
    justify-content: space-between;
  }
  #clear-checked {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 13px;
    cursor: pointer;
    padding: 0;
  }
  ul#list {
    list-style: none;
    margin: 0;
    padding: 0;
    background: var(--card);
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  li.item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
  }
  li.item:last-child {
    border-bottom: none;
  }
  .checkbox {
    width: 22px;
    height: 22px;
    flex-shrink: 0;
    border-radius: 50%;
    border: 2px solid var(--accent);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
  }
  .checkbox.checked {
    background: var(--accent);
  }
  .checkbox.checked::after {
    content: "✓";
    color: white;
    font-size: 13px;
    font-weight: 700;
  }
  .item-text {
    flex: 1;
    font-size: 16px;
    word-break: break-word;
  }
  .item.checked .item-text {
    color: var(--sub);
    text-decoration: line-through;
  }
  .delete-btn {
    background: none;
    border: none;
    color: var(--danger);
    font-size: 20px;
    line-height: 1;
    cursor: pointer;
    padding: 4px 6px;
    flex-shrink: 0;
  }
  .empty {
    text-align: center;
    color: var(--sub);
    padding: 40px 16px;
    font-size: 14px;
  }
</style>
</head>
<body>
<div class="app">
  <h1>🛒 쇼핑 리스트</h1>
  <div class="input-row">
    <input id="item-input" type="text" placeholder="아이템 입력 후 Enter" maxlength="100" autofocus>
    <button id="add-btn">추가</button>
  </div>
  <div class="stats">
    <span id="count-text"></span>
    <button id="clear-checked">체크된 항목 삭제</button>
  </div>
  <ul id="list"></ul>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://nxecpeqibaqdjndqrosn.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_cP1q2kcEM_L8bqYhIoU53A_VipxDB0k";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function loadItems() {
  const { data, error } = await supabase
    .from("shopping_items")
    .select("id, text, checked")
    .order("created_at", { ascending: true });
  if (error) {
    console.error(error);
    return [];
  }
  return data;
}

let items = [];

const listEl = document.getElementById("list");
const inputEl = document.getElementById("item-input");
const addBtn = document.getElementById("add-btn");
const countText = document.getElementById("count-text");
const clearCheckedBtn = document.getElementById("clear-checked");

function render() {
  listEl.innerHTML = "";

  if (items.length === 0) {
    listEl.innerHTML = '<li class="empty">담긴 아이템이 없습니다</li>';
  } else {
    items.forEach(item => {
      const li = document.createElement("li");
      li.className = "item" + (item.checked ? " checked" : "");

      const checkbox = document.createElement("button");
      checkbox.className = "checkbox" + (item.checked ? " checked" : "");
      checkbox.setAttribute("aria-label", "완료 체크");
      checkbox.onclick = () => toggleItem(item.id);

      const text = document.createElement("span");
      text.className = "item-text";
      text.textContent = item.text;

      const deleteBtn = document.createElement("button");
      deleteBtn.className = "delete-btn";
      deleteBtn.textContent = "✕";
      deleteBtn.setAttribute("aria-label", "삭제");
      deleteBtn.onclick = () => deleteItem(item.id);

      li.appendChild(checkbox);
      li.appendChild(text);
      li.appendChild(deleteBtn);
      listEl.appendChild(li);
    });
  }

  const total = items.length;
  const checked = items.filter(i => i.checked).length;
  countText.textContent = total === 0 ? "" : `전체 ${total} · 완료 ${checked}`;
}

async function addItem() {
  const text = inputEl.value.trim();
  if (!text) return;
  const { data, error } = await supabase
    .from("shopping_items")
    .insert({ text, checked: false })
    .select("id, text, checked")
    .single();
  if (error) {
    console.error(error);
    return;
  }
  items.push(data);
  inputEl.value = "";
  render();
  inputEl.focus();
}

async function toggleItem(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  const nextChecked = !item.checked;
  const { error } = await supabase
    .from("shopping_items")
    .update({ checked: nextChecked })
    .eq("id", id);
  if (error) {
    console.error(error);
    return;
  }
  item.checked = nextChecked;
  render();
}

async function deleteItem(id) {
  const { error } = await supabase
    .from("shopping_items")
    .delete()
    .eq("id", id);
  if (error) {
    console.error(error);
    return;
  }
  items = items.filter(i => i.id !== id);
  render();
}

async function clearChecked() {
  const checkedIds = items.filter(i => i.checked).map(i => i.id);
  if (checkedIds.length === 0) return;
  const { error } = await supabase
    .from("shopping_items")
    .delete()
    .in("id", checkedIds);
  if (error) {
    console.error(error);
    return;
  }
  items = items.filter(i => !i.checked);
  render();
}

addBtn.addEventListener("click", addItem);
inputEl.addEventListener("keydown", e => {
  if (e.key === "Enter") addItem();
});
clearCheckedBtn.addEventListener("click", clearChecked);

(async () => {
  items = await loadItems();
  render();
})();
</script>
</body>
</html>
